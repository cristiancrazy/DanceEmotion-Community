name: Create Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build AMD64 Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          tags: danceemotionweb:amd64
          outputs: type=docker,dest=/tmp/danceemotionweb_amd64.tar

      - name: Upload AMD64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: danceemotionweb_amd64
          path: /tmp/danceemotionweb_amd64.tar
          retention-days: 5

  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM64 Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          tags: danceemotionweb:arm64
          outputs: type=docker,dest=/tmp/danceemotionweb_arm64.tar

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: danceemotionweb_arm64
          path: /tmp/danceemotionweb_arm64.tar
          retention-days: 5
